<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <title>SHARP Splat Viewer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
    <style>
      body {
        overflow: hidden;
        margin: 0;
        height: 100vh;
        width: 100vw;
        font-family: sans-serif;
        background: #0a0a0f;
        color: white;
        text-shadow: 0 0 3px black;
      }
      #canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      .scene, #message {
        position: absolute;
        display: flex;
        top: 0; right: 0; left: 0; bottom: 0;
        z-index: 2;
        height: 100%; width: 100%;
        align-items: center;
        justify-content: center;
      }
      #message {
        font-weight: bold;
        font-size: large;
        color: red;
        pointer-events: none;
      }
      #progress {
        position: absolute;
        top: 0;
        height: 3px;
        background: #8b78ff;
        z-index: 99;
        transition: width 0.1s ease-in-out;
      }
      #quality, #caminfo, #info {
        display: none;
      }

      /* Loading cube animation */
      .cube-wrapper { transform-style: preserve-3d; }
      .cube {
        transform-style: preserve-3d;
        transform: rotateX(45deg) rotateZ(45deg);
        animation: rotation 2s infinite;
      }
      .cube-faces {
        transform-style: preserve-3d;
        height: 50px; width: 50px;
        position: relative;
        transform-origin: 0 0;
        transform: translateX(0) translateY(0) translateZ(-25px);
      }
      .cube-face {
        position: absolute;
        inset: 0;
        background: #8b78ff;
        border: solid 1px rgba(255,255,255,0.3);
      }
      .cube-face.top { transform: translateZ(50px); }
      .cube-face.front { transform-origin: 0 50%; transform: rotateY(-90deg); }
      .cube-face.back { transform-origin: 0 50%; transform: rotateY(-90deg) translateZ(-50px); }
      .cube-face.right { transform-origin: 50% 0; transform: rotateX(-90deg) translateY(-50px); }
      .cube-face.left { transform-origin: 50% 0; transform: rotateX(-90deg) translateY(-50px) translateZ(50px); }
      @keyframes rotation {
        0% { transform: rotateX(45deg) rotateY(0) rotateZ(45deg); animation-timing-function: cubic-bezier(0.17,0.84,0.44,1); }
        50% { transform: rotateX(45deg) rotateY(0) rotateZ(225deg); animation-timing-function: cubic-bezier(0.76,0.05,0.86,0.06); }
        100% { transform: rotateX(45deg) rotateY(0) rotateZ(405deg); }
      }
    </style>
  </head>
  <body>
    <div id="info"></div>
    <div id="progress"></div>
    <div id="message"></div>
    <div class="scene" id="spinner">
      <div class="cube-wrapper">
        <div class="cube">
          <div class="cube-faces">
            <div class="cube-face bottom"></div>
            <div class="cube-face top"></div>
            <div class="cube-face left"></div>
            <div class="cube-face right"></div>
            <div class="cube-face back"></div>
            <div class="cube-face front"></div>
          </div>
        </div>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="quality"><span id="fps"></span></div>
    <div id="caminfo"><span id="camid"></span></div>
    <script src="/splat-engine.js"></script>
  </body>
</html>
